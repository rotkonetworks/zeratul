[package]
name = "poker-shuffle-wasm"
version = "0.1.0"
edition = "2021"
description = "WASM bindings for mental poker zk-shuffle"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["std"]
std = []
wasm = ["std", "dep:wasm-bindgen", "dep:serde", "dep:serde_json", "getrandom/js"]

[dependencies]
zk-shuffle = { path = "../zk-shuffle", default-features = false, features = ["std"] }
curve25519-dalek = { version = "4.1", default-features = false, features = ["digest", "rand_core", "group"] }
rand_core = { version = "0.6", features = ["getrandom"] }
getrandom = { version = "0.2" }

# wasm bindings
wasm-bindgen = { version = "0.2", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
