<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>zk.poker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ease-decel: cubic-bezier(0.05, 0.7, 0.1, 1);    /* things arriving */
      --ease-accel: cubic-bezier(0.3, 0, 0.8, 0.15);    /* things leaving */
      --ease-overshoot: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    /* prevent iOS bounce scroll */
    html, body { overscroll-behavior: none; position: fixed; width: 100%; height: 100%; }
    /* ambient page background — subtle warm radial instead of flat black */
    body { background: radial-gradient(1100px 700px at 50% -10%, #141109 0%, #0a0a0a 60%) #0a0a0a; }
    /* safe area insets for notched phones */
    #root { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); height: 100%; }

    /* card dealt onto the board / into a hand */
    @keyframes deal-in {
      from { transform: translateY(-14px) rotate(-4deg) scale(0.85); opacity: 0; }
      60%  { opacity: 1; }
      to   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    }
    .card-deal { animation: deal-in 250ms var(--ease-decel) both; animation-delay: calc(var(--i, 0) * 90ms); }

    /* acting seat: breathing accent ring (pseudo-element glow = compositor-cheap) */
    @keyframes acting-pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(244,183,40,0.9), 0 0 18px 2px rgba(244,183,40,0.25); }
      50%      { box-shadow: 0 0 0 2px rgba(244,183,40,0.9), 0 0 30px 6px rgba(244,183,40,0.45); }
    }
    .seat-acting { animation: acting-pulse 1.8s ease-in-out infinite; }

    /* timer critical: fast pulse, last seconds only */
    @keyframes critical-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
    .timer-critical { animation: critical-pulse 0.6s ease-in-out infinite; }

    /* winner pod: pulse twice, then settle */
    .seat-winner { animation: acting-pulse 0.9s ease-out 2; }

    @media (prefers-reduced-motion: reduce) {
      .card-deal { animation: none; }
      .seat-acting, .seat-winner { animation: none; box-shadow: 0 0 0 2px rgba(244,183,40,0.9); }
      .timer-critical { animation: none; }
      * { transition-duration: 0.01ms !important; }
    }
  </style>

  <link rel="stylesheet" crossorigin href="/assets/index-DjsiNazr.css">
</head>

  <div id="root"></div>
</body>
</html>
