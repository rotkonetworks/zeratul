[package]
name = "zcli"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "zcash wallet CLI — ssh keys as wallet seed, agent-friendly"
repository = "https://github.com/rotkonetworks/zeratul"

[[bin]]
name = "zcli"
path = "src/main.rs"

[dependencies]
# cli
clap = { version = "4", features = ["derive", "env"] }

# ssh key loading
ssh-key = { version = "0.6", features = ["encryption", "ed25519"] }

# async runtime
tokio = { version = "1", features = ["full"] }

# bip39 mnemonic
bip39 = { version = "2.0", features = ["rand"] }

# orchard / zcash
orchard = { version = "0.12", default-features = false, features = ["circuit"] }
zcash_keys = { version = "0.12", default-features = false, features = ["orchard"] }
zcash_protocol = { version = "0.7", default-features = false }
zip32 = { version = "0.2", default-features = false }
zcash_address = "0.7"
zcash_note_encryption = "0.4"

# merkle tree witness construction
incrementalmerkletree = { version = "0.8", features = ["legacy-api"] }

# transparent address crypto (secp256k1)
k256 = { version = "0.13", features = ["ecdsa-core", "ecdsa", "sha256"] }
hmac = "0.12"
sha2 = "0.10"
ripemd = "0.1"

# hashing
blake2 = "0.10"
blake2b_simd = "1.0"

# gRPC-web client
prost = "0.12"
reqwest = { version = "0.12", features = ["rustls-tls"], default-features = false }

# gRPC (build-time proto codegen)
tonic = { version = "0.11", default-features = false, features = ["codegen", "prost"] }

# terminal
rpassword = "7"
is-terminal = "0.4"
indicatif = "0.17"
qrcode = "0.14"

# local wallet storage
sled = "0.34"

# serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# error handling
thiserror = "1.0"
anyhow = "1.0"

# misc
urlencoding = "2"
hex = "0.4"
rand = "0.8"
zeroize = { version = "1", features = ["zeroize_derive"] }

[build-dependencies]
tonic-build = "0.11"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
